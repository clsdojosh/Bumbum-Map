<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bumbum's Trip Map & Itinerary</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --primary: #6366f1; }
        body { margin: 0; overflow: hidden; font-family: system-ui, -apple-system, sans-serif; background-color: #f8fafc; height: 100vh; width: 100vw; }
        #map { height: 100%; width: 100%; z-index: 1; }
        
        /* Mobile Layout */
        .app-container { display: flex; flex-direction: column; height: 100vh; position: relative; }
        
        .custom-div-icon { background: none; border: none; }
        .marker-pin { width: 40px; height: 40px; border-radius: 50%; border: 2px solid white; box-shadow: 0 4px 10px rgba(0,0,0,0.2); overflow: hidden; background-color: var(--primary); display: flex; align-items: center; justify-content: center; }
        .marker-pin img { width: 100%; height: 100%; object-fit: cover; }
        .marker-number { position: absolute; top: -5px; right: -5px; background: #ef4444; color: white; font-size: 10px; font-weight: bold; width: 18px; height: 18px; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 1.5px solid white; z-index: 10; }

        /* Panel Logic */
        #side-panel { 
            position: absolute; 
            z-index: 1000; 
            background: white; 
            transition: transform 0.3s ease-in-out;
        }

        /* Desktop Sidebar */
        @media (min-width: 768px) {
            #side-panel { top: 80px; left: 16px; bottom: 16px; width: 380px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
            .mobile-only { display: none; }
        }

        /* Mobile Bottom Sheet */
        @media (max-width: 767px) {
            #side-panel { 
                bottom: 0; left: 0; right: 0; 
                height: 60vh; 
                border-radius: 24px 24px 0 0; 
                transform: translateY(calc(60vh - 60px)); 
                box-shadow: 0 -10px 25px rgba(0,0,0,0.1);
            }
            #side-panel.open { transform: translateY(0); }
            .desktop-only { display: none; }
        }

        .drag-handle { width: 40px; height: 4px; background: #e2e8f0; border-radius: 2px; margin: 12px auto; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        #modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); z-index: 2000; align-items: center; justify-content: center; padding: 16px; }
    </style>
</head>
<body>

    <div id="loading-screen" class="fixed inset-0 bg-white z-[9999] flex flex-col items-center justify-center">
        <div class="w-12 h-12 border-4 border-indigo-200 border-t-indigo-600 rounded-full animate-spin"></div>
    </div>

    <div class="app-container">
        <!-- Top Nav -->
        <header class="absolute top-0 left-0 right-0 z-[1100] p-3 pointer-events-none">
            <div class="bg-white/90 backdrop-blur shadow-lg rounded-2xl p-2 flex items-center gap-2 pointer-events-auto border border-gray-100 max-w-4xl mx-auto">
                <div class="flex-shrink-0 px-3 py-1 bg-indigo-600 text-white rounded-xl text-sm font-bold">Bumbum 🐾</div>
                
                <div class="relative flex-grow min-w-0">
                    <input type="text" id="map-search" placeholder="Search..." class="w-full bg-gray-100 border-none rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-indigo-500 outline-none">
                    <div id="search-results" class="hidden absolute top-full left-0 right-0 bg-white mt-2 rounded-xl shadow-xl border max-h-48 overflow-y-auto z-[1200]"></div>
                </div>

                <div class="flex gap-1">
                    <button onclick="exportData()" class="p-2 text-indigo-600 hover:bg-indigo-50 rounded-lg">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                    </button>
                    <label class="p-2 text-indigo-600 hover:bg-indigo-50 rounded-lg cursor-pointer">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path></svg>
                        <input type="file" id="import-input" class="hidden" accept=".json" onchange="importData(event)">
                    </label>
                </div>
            </div>
        </header>

        <div id="map"></div>

        <!-- Sliding Panel -->
        <div id="side-panel" class="flex flex-col">
            <div class="mobile-only drag-handle" onclick="togglePanel()"></div>
            
            <!-- Day Navigation -->
            <div class="px-4 py-2 border-b border-gray-100 bg-white">
                <div class="flex items-center justify-between mb-2">
                    <h2 class="text-xs font-bold text-gray-400 uppercase tracking-widest">Your Trip</h2>
                    <div class="flex gap-3">
                        <button onclick="addNewDay()" class="text-xs font-bold text-indigo-600">+ Day</button>
                        <button onclick="saveCurrentTrip()" class="text-xs font-bold text-emerald-600">Save Plan</button>
                    </div>
                </div>
                <div id="day-selector" class="flex gap-2 overflow-x-auto no-scrollbar pb-1"></div>
            </div>

            <!-- Internal Tabs -->
            <div class="flex border-b border-gray-100 bg-gray-50/50">
                <button onclick="setViewTab('places')" id="tab-places" class="flex-1 py-3 text-xs font-bold border-b-2 border-indigo-600 text-indigo-600">Map Places</button>
                <button onclick="setViewTab('itinerary')" id="tab-itinerary" class="flex-1 py-3 text-xs font-bold border-b-2 border-transparent text-gray-400">Day Schedule</button>
                <button onclick="setViewTab('library')" id="tab-library" class="flex-1 py-3 text-xs font-bold border-b-2 border-transparent text-gray-400">Library</button>
            </div>

            <!-- Content Area -->
            <div id="panel-content" class="flex-grow overflow-y-auto p-4 bg-white">
                <!-- Places List -->
                <div id="view-places" class="space-y-3"></div>
                
                <!-- Itinerary List -->
                <div id="view-itinerary" class="hidden space-y-4">
                    <div class="flex justify-between items-center mb-4">
                        <h3 class="font-bold text-gray-800">Time-based Plan</h3>
                        <button onclick="openItineraryModal()" class="bg-indigo-100 text-indigo-600 px-3 py-1 rounded-lg text-xs font-bold">+ Activity</button>
                    </div>
                    <div id="itinerary-list" class="space-y-4 relative before:absolute before:left-3 before:top-2 before:bottom-2 before:w-0.5 before:bg-gray-100"></div>
                </div>

                <!-- Saved Library -->
                <div id="view-library" class="hidden space-y-3"></div>
            </div>
        </div>
    </div>

    <!-- Modals -->
    <div id="modal-overlay" onclick="if(event.target === this) closeModal()">
        <!-- Place Modal -->
        <div id="modal-place" class="bg-white p-6 rounded-3xl w-full max-w-sm hidden" onclick="event.stopPropagation()">
            <h3 class="text-lg font-bold mb-4">Add Place</h3>
            <input type="text" id="place-name" placeholder="Name of place..." class="w-full bg-gray-50 border rounded-xl p-3 mb-3 outline-none focus:ring-2 focus:ring-indigo-500">
            <input type="text" id="place-photo" placeholder="Photo URL (Optional)" class="w-full bg-gray-50 border rounded-xl p-3 mb-4 outline-none focus:ring-2 focus:ring-indigo-500">
            <div class="flex gap-2 mb-6">
                <input type="checkbox" id="place-suggested" class="w-5 h-5 rounded text-indigo-600">
                <label for="place-suggested" class="text-sm text-gray-600">Suggested (no route line)</label>
            </div>
            <button onclick="confirmPlace()" class="w-full bg-indigo-600 text-white font-bold py-3 rounded-xl shadow-lg">Save Pin</button>
        </div>

        <!-- Itinerary Modal -->
        <div id="modal-itinerary" class="bg-white p-6 rounded-3xl w-full max-w-sm hidden" onclick="event.stopPropagation()">
            <h3 class="text-lg font-bold mb-4">Add Schedule Activity</h3>
            <label class="text-xs font-bold text-gray-400">TIME</label>
            <input type="time" id="iti-time" class="w-full bg-gray-50 border rounded-xl p-3 mb-3">
            <label class="text-xs font-bold text-gray-400">ACTIVITY</label>
            <input type="text" id="iti-desc" placeholder="What are you doing?" class="w-full bg-gray-50 border rounded-xl p-3 mb-4">
            <button onclick="saveItineraryItem()" class="w-full bg-indigo-600 text-white font-bold py-3 rounded-xl">Add to Day</button>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        let map, pendingLatLng, currentTab = 'places';
        let state = {
            tripDays: [{ id: 'd1', name: 'Day 1', locations: [], suggested: [], itinerary: [] }],
            activeDayIdx: 0,
            savedTrips: []
        };
        let markers = {};
        let routeLine = null;

        // Initialize
        async function init() {
            map = L.map('map', { zoomControl: false }).setView([14.5995, 120.9842], 13);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png').addTo(map);

            map.on('click', (e) => {
                pendingLatLng = e.latlng;
                openModal('place');
            });

            await loadData();
            updateUI();
            document.getElementById('loading-screen').classList.add('hidden');
        }

        async function loadData() {
            try {
                const res = await fetch('trips_data.json');
                if (res.ok) state = await res.json();
                else {
                    const local = localStorage.getItem('bumbum_trips_v2');
                    if (local) state = JSON.parse(local);
                }
            } catch (e) {
                const local = localStorage.getItem('bumbum_trips_v2');
                if (local) state = JSON.parse(local);
            }
        }

        function persist() {
            localStorage.setItem('bumbum_trips_v2', JSON.stringify(state));
            updateUI();
        }

        function updateUI() {
            renderDaySelector();
            renderContent();
            updateMapLayers();
        }

        // --- View Logic ---
        function togglePanel() {
            document.getElementById('side-panel').classList.toggle('open');
        }

        function setViewTab(tab) {
            currentTab = tab;
            ['places', 'itinerary', 'library'].forEach(t => {
                document.getElementById(`view-${t}`).classList.toggle('hidden', t !== tab);
                document.getElementById(`tab-${t}`).className = `flex-1 py-3 text-xs font-bold border-b-2 transition-all ${t === tab ? 'border-indigo-600 text-indigo-600' : 'border-transparent text-gray-400'}`;
            });
            if (window.innerWidth < 768) document.getElementById('side-panel').classList.add('open');
        }

        function renderDaySelector() {
            const container = document.getElementById('day-selector');
            container.innerHTML = state.tripDays.map((d, i) => `
                <button onclick="state.activeDayIdx=${i}; persist()" class="flex-shrink-0 px-4 py-1.5 rounded-full text-xs font-bold transition-all ${i === state.activeDayIdx ? 'bg-indigo-600 text-white shadow-md' : 'bg-gray-100 text-gray-500'}">
                    ${d.name}
                </button>
            `).join('');
        }

        function renderContent() {
            const day = state.tripDays[state.activeDayIdx];
            
            // Places
            const placesContainer = document.getElementById('view-places');
            if (day.locations.length === 0 && day.suggested.length === 0) {
                placesContainer.innerHTML = `<div class="text-center py-10 text-gray-400 text-sm">Tap the map to add pins for Day ${state.activeDayIdx + 1}</div>`;
            } else {
                placesContainer.innerHTML = day.locations.map((l, i) => createItemHtml(l, i + 1)).join('') + 
                    (day.suggested.length ? `<div class="text-[10px] font-bold text-gray-300 uppercase mt-4">Suggested</div>` : '') +
                    day.suggested.map(l => createItemHtml(l, '★')).join('');
            }

            // Itinerary
            const itiContainer = document.getElementById('itinerary-list');
            if (day.itinerary.length === 0) {
                itiContainer.innerHTML = `<div class="text-center py-10 text-gray-400 text-sm">No schedule set for this day.</div>`;
            } else {
                itiContainer.innerHTML = day.itinerary
                    .sort((a, b) => a.time.localeCompare(b.time))
                    .map(item => `
                    <div class="flex items-start gap-4 relative z-10">
                        <div class="w-16 flex-shrink-0 text-[10px] font-bold text-indigo-600 bg-indigo-50 py-1 rounded-md text-center">${item.time}</div>
                        <div class="flex-grow bg-white border border-gray-100 p-3 rounded-xl shadow-sm flex justify-between group">
                            <span class="text-sm font-medium text-gray-700">${item.desc}</span>
                            <button onclick="removeItineraryItem('${item.id}')" class="text-gray-300 hover:text-red-500 opacity-0 group-hover:opacity-100 transition-opacity">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                            </button>
                        </div>
                    </div>
                `).join('');
            }

            // Library
            const libContainer = document.getElementById('view-library');
            libContainer.innerHTML = state.savedTrips.length ? state.savedTrips.map(t => `
                <div class="p-4 bg-gray-50 rounded-2xl border flex items-center justify-between">
                    <div>
                        <h4 class="font-bold text-sm text-gray-800">${t.name}</h4>
                        <p class="text-[10px] text-gray-400">${t.days.length} Days</p>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="loadTrip('${t.id}')" class="bg-indigo-600 text-white text-[10px] px-3 py-1.5 rounded-lg font-bold">LOAD</button>
                        <button onclick="deleteTrip('${t.id}')" class="text-red-400 hover:text-red-600"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg></button>
                    </div>
                </div>
            `).join('') : `<div class="text-center py-10 text-gray-400 text-sm">Save your active plans to see them here.</div>`;
        }

        function createItemHtml(l, marker) {
            return `
                <div class="flex items-center gap-3 p-2 hover:bg-gray-50 rounded-xl transition cursor-pointer" onclick="map.flyTo([${l.latlng.lat}, ${l.latlng.lng}], 15)">
                    <div class="w-8 h-8 rounded-lg bg-indigo-50 flex items-center justify-center text-[10px] font-bold text-indigo-600 flex-shrink-0">${marker}</div>
                    <div class="flex-grow min-w-0">
                        <p class="text-sm font-bold text-gray-700 truncate">${l.name}</p>
                    </div>
                    <button onclick="event.stopPropagation(); removePlace('${l.id}')" class="text-gray-300 hover:text-red-500 p-1">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                    </button>
                </div>
            `;
        }

        // --- Actions ---
        function addNewDay() {
            state.tripDays.push({ id: 'd'+Date.now(), name: 'Day '+(state.tripDays.length+1), locations: [], suggested: [], itinerary: [] });
            state.activeDayIdx = state.tripDays.length - 1;
            persist();
        }

        function openModal(type) {
            document.getElementById('modal-overlay').style.display = 'flex';
            document.getElementById('modal-place').classList.toggle('hidden', type !== 'place');
            document.getElementById('modal-itinerary').classList.toggle('hidden', type !== 'iti');
        }

        function closeModal() {
            document.getElementById('modal-overlay').style.display = 'none';
        }

        function confirmPlace() {
            const name = document.getElementById('place-name').value;
            if(!name) return;
            const item = {
                id: 'p'+Date.now(),
                name,
                photo: document.getElementById('place-photo').value,
                latlng: pendingLatLng,
                isSuggested: document.getElementById('place-suggested').checked
            };
            const day = state.tripDays[state.activeDayIdx];
            if(item.isSuggested) day.suggested.push(item);
            else day.locations.push(item);
            
            document.getElementById('place-name').value = '';
            document.getElementById('place-photo').value = '';
            closeModal();
            persist();
        }

        function openItineraryModal() {
            openModal('iti');
        }

        function saveItineraryItem() {
            const time = document.getElementById('iti-time').value;
            const desc = document.getElementById('iti-desc').value;
            if(!time || !desc) return;
            
            state.tripDays[state.activeDayIdx].itinerary.push({ id: 'iti'+Date.now(), time, desc });
            document.getElementById('iti-time').value = '';
            document.getElementById('iti-desc').value = '';
            closeModal();
            persist();
        }

        function removePlace(id) {
            const day = state.tripDays[state.activeDayIdx];
            day.locations = day.locations.filter(p => p.id !== id);
            day.suggested = day.suggested.filter(p => p.id !== id);
            persist();
        }

        function removeItineraryItem(id) {
            const day = state.tripDays[state.activeDayIdx];
            day.itinerary = day.itinerary.filter(i => i.id !== id);
            persist();
        }

        function saveCurrentTrip() {
            const name = prompt("Name this plan?", "My Trip");
            if(!name) return;
            state.savedTrips.push({
                id: 't'+Date.now(),
                name,
                days: JSON.parse(JSON.stringify(state.tripDays))
            });
            persist();
            setViewTab('library');
        }

        function loadTrip(id) {
            const trip = state.savedTrips.find(t => t.id === id);
            if(trip) {
                state.tripDays = JSON.parse(JSON.stringify(trip.days));
                state.activeDayIdx = 0;
                persist();
                setViewTab('places');
            }
        }

        function deleteTrip(id) {
            if(!confirm("Delete this plan?")) return;
            state.savedTrips = state.savedTrips.filter(t => t.id !== id);
            persist();
        }

        // --- Map Logic ---
        function updateMapLayers() {
            Object.values(markers).forEach(m => map.removeLayer(m));
            markers = {};
            if(routeLine) map.removeLayer(routeLine);

            const day = state.tripDays[state.activeDayIdx];
            if(!day) return;

            [...day.locations, ...day.suggested].forEach((l, i) => {
                const isSuggested = day.suggested.find(s => s.id === l.id);
                const label = isSuggested ? null : day.locations.indexOf(l) + 1;
                
                const icon = L.divIcon({
                    className: 'custom-div-icon',
                    html: `<div class="marker-pin" style="background-color: ${isSuggested ? '#10b981' : '#6366f1'}">${l.photo ? `<img src="${l.photo}">` : `<span class="text-white text-[10px] font-bold">📍</span>`} ${label ? `<div class="marker-number">${label}</div>` : ''}</div>`,
                    iconSize: [40, 40],
                    iconAnchor: [20, 20]
                });

                const m = L.marker(l.latlng, { icon }).addTo(map);
                m.bindPopup(`<strong>${l.name}</strong>`);
                markers[l.id] = m;
            });

            if(day.locations.length > 1) {
                routeLine = L.polyline(day.locations.map(l => l.latlng), { color: '#6366f1', dashArray: '8, 8', weight: 3 }).addTo(map);
            }
        }

        // Export/Import
        function exportData() {
            const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'trips_data.json';
            a.click();
        }

        function importData(e) {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = (ev) => {
                state = JSON.parse(ev.target.result);
                persist();
            };
            reader.readAsText(file);
        }

        // Search logic
        let searchTimer;
        document.getElementById('map-search').addEventListener('input', (e) => {
            clearTimeout(searchTimer);
            const val = e.target.value;
            if(val.length < 3) return;
            searchTimer = setTimeout(async () => {
                const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${val}`);
                const data = await res.json();
                const container = document.getElementById('search-results');
                container.innerHTML = data.map(p => `<div class="p-3 hover:bg-indigo-50 cursor-pointer text-xs border-b" onclick="map.flyTo([${p.lat}, ${p.lon}], 15); document.getElementById('search-results').classList.add('hidden')">${p.display_name}</div>`).join('');
                container.classList.remove('hidden');
            }, 500);
        });

        window.onload = init;
    </script>
</body>
</html>
